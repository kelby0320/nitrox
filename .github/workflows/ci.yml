name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to keep the queue tidy.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build kernel + host tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Two toolchains, on purpose. The kernel and tools stay on **stable** with the
      # built-in bare target. Userspace pins a **nightly** in
      # `userspace/rust-toolchain.toml` because its hard-float target is a custom spec,
      # and a custom spec has no precompiled sysroot — `-Z build-std` (nightly-only)
      # rebuilds `core`/`alloc` from `rust-src`. rustup picks the right one per
      # directory; the `check-nightly` step below keeps the pin from becoming a licence
      # to use nightly language features. See the decision log, 2026-07-21.
      - name: Install Rust (stable for kernel/tools, pinned nightly for userspace)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add x86_64-unknown-none
          rustup toolchain install "$(grep -oP 'channel\s*=\s*"\K[^"]+' userspace/rust-toolchain.toml)" \
            --profile minimal --component rust-src --no-self-update

      - name: Cache cargo registry and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kernel/target
            tools/target
            userspace/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml', '.cargo/config.toml', 'kernel/.cargo/config.toml', 'userspace/rust-toolchain.toml', 'userspace/x86_64-unknown-nitrox.json') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Enforce the architecture-abstraction boundary: kernel code outside
      # arch/ must not reference arch internals. See
      # docs/conventions/arch-boundary.md.
      - name: cargo xtask check-arch
        run: cargo xtask check-arch

      # The nightly pin in userspace/ exists solely to `-Z build-std` the custom
      # hard-float target. This fails the build if any shipped crate reaches for a
      # nightly language or library feature, keeping the exception narrow.
      - name: cargo xtask check-nightly
        run: cargo xtask check-nightly

      # Builds the kernel ELF for x86_64-unknown-none. Image assembly
      # (sgdisk + mtools) and QEMU are intentionally not exercised here —
      # those are integration concerns deferred to Phase 1 CI.
      - name: cargo xtask build
        run: cargo xtask build

      # Host-side tests: kernel lib (compiled against the host triple via
      # an internal override in xtask) plus the tools workspace.
      - name: cargo xtask test
        run: cargo xtask test
